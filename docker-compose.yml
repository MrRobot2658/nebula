name: nebula

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nebula
      MYSQL_USER: nebula
      MYSQL_PASSWORD: nebula
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unebula", "-pnebula"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    image: nebula-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://nebula:nebula@db:3306/nebula?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  worker:
    build: ./backend
    image: nebula-backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://nebula:nebula@db:3306/nebula?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  dbdata:
